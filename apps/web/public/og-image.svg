<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4338ca;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="60" fill="white" fill-opacity="0.1"/>
  <circle cx="1100" cy="530" r="80" fill="white" fill-opacity="0.1"/>
  <circle cx="900" cy="150" r="40" fill="white" fill-opacity="0.15"/>
  
  <!-- Main logo container -->
  <rect x="100" y="250" width="120" height="120" rx="24" fill="white" fill-opacity="0.2"/>
  <rect x="115" y="265" width="90" height="90" rx="18" fill="white" fill-opacity="0.3"/>
  
  <!-- Letter M -->
  <path d="M145 340V290L160 320L175 290V340" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Brand name -->
  <text x="260" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="white" letter-spacing="-2">
    Maintix
  </text>
  
  <!-- Tagline -->
  <text x="260" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="white" fill-opacity="0.9">
    Property Maintenance Management
  </text>
  
  <!-- Feature badges -->
  <rect x="100" y="450" width="280" height="60" rx="12" fill="white" fill-opacity="0.15" filter="url(#shadow)"/>
  <text x="240" y="488" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" fill="white" text-anchor="middle">
    Track Tickets
  </text>
  
  <rect x="400" y="450" width="280" height="60" rx="12" fill="white" fill-opacity="0.15" filter="url(#shadow)"/>
  <text x="540" y="488" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" fill="white" text-anchor="middle">
    Manage Properties
  </text>
  
  <rect x="700" y="450" width="280" height="60" rx="12" fill="white" fill-opacity="0.15" filter="url(#shadow)"/>
  <text x="840" y="488" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" fill="white" text-anchor="middle">
    Team Collaboration
  </text>
  
  <!-- URL at bottom -->
  <text x="600" y="580" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="white" fill-opacity="0.7" text-anchor="middle">
    maintix.app
  </text>
</svg>
